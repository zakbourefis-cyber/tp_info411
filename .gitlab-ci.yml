image: alpine

stages:
  - deploy

deploy:
  stage: deploy
  when: manual
  before_script:
    - apk add openssh
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - eval $(ssh-agent -s)
  script:
    - echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-add ~/.ssh/id_ed25519
    - ssh -o StrictHostKeyChecking=no "$SSH_USER"@"$SSH_HOST" "cd $WORKDIR && git pull"