services:
  mariadb:
    image: mariadb
    restart: always
    volumes:
      - base_de_donnees:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: location_voiture
      MARIADB_USER: zak_user
      MARIADB_PASSWORD: zak_pass
  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mariadb
  web:
    build: .
    ports:
      - "80:80"
    environment:
      SERVEUR_BD: mariadb
      LOGIN_BD: zak_user
      PASS_BD: zak_pass
      NOM_BD: location_voiture
      PORT_BD: 3306
volumes:
  base_de_donnees: