services:
  mariadb:
    image: mariadb
    restart : always
    volumes:
      - ./bd_data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${NOM_BD}
      MARIADB_USER: ${LOGIN_BD}
      MARIADB_PASSWORD: ${PASS_BD}

  phpmyadmin:
    image: phpmyadmin
    ports:
      - ${PORT_PMA}:80
    environment:
      PMA_ARBITRARY: 1

  web:
    image: zakariabourefis/monapache
    ports:
      - ${PORT_SITE}:80
    volumes:
      - .:/var/www/html
    environment:
      - SERVEUR_BD
      - LOGIN_BD
      - PASS_BD
      - NOM_BD
      - PORT_BD